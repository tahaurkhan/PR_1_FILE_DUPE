name: Build Windows EXE

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '25' 
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Prepare Installer Files
      shell: cmd
      run: |
        if not exist target\installer-input mkdir target\installer-input
        copy target\*.jar target\installer-input\
        mvn dependency:copy-dependencies -DoutputDirectory=target\installer-input

    - name: Build EXE with jpackage
      shell: cmd
      run: |
        jpackage --type exe --dest dist_output --name "SmartFileDuplicateDetector" --input target\installer-input --main-jar PR_1_FILE_DUPE-1.0-SNAPSHOT.jar --main-class com.example.pr_1_file_dupe.Launcher --icon src\main\resources\com\example\pr_1_file_dupe\img\logo.ico --win-shortcut --win-menu --win-dir-chooser

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: dist_output\*.exe
