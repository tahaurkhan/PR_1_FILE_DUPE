name: Build Windows EXE

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Java 21 is the current Long-Term Support (LTS) version and matches your pom.xml
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' 
        distribution: 'temurin'
        cache: maven

    # 🔥 THE MAGIC: This one line builds the Fat JAR and runs jpackage automatically 
    # using the profile we configured in your pom.xml!
    - name: Build EXE with Maven Profile
      run: mvn clean package -P windows-installer

    # Grabs the finished .exe file from the folder Maven created
    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Smart File Duplicate Detector-Installer
        path: target/installer/*.exe
